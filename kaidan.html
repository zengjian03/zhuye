<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>开菜单 · 手机极简版</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #4a6fa5;
            --secondary-color: #6b8cbc;
            --accent-color: #ff7e5f;
            --light-bg: #f8fafc;
            --dark-text: #1e293b;
            --success-color: #2b7e3a;
            --danger-color: #e53e3e;
            --border-radius: 20px;
            --card-radius: 18px;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.03), 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #ecf3fa;
            font-family: 'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
            padding: 12px 12px 24px;
            color: var(--dark-text);
        }

        /* 主容器 */
        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        /* 顶部导航栏 更紧凑且适合触摸 */
        .navbar {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border-radius: 28px;
            padding: 14px 12px;
            margin-bottom: 18px;
            box-shadow: var(--shadow-md);
        }

        .navbar h1 {
            font-size: 1.4rem;
            font-weight: 600;
            text-align: center;
            color: white;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            letter-spacing: -0.3px;
        }

        /* 分类按钮组 — 水平滑动，加大触控区域 */
        .nav-buttons {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            scrollbar-width: thin;
            padding-bottom: 6px;
            -webkit-overflow-scrolling: touch;
            scroll-snap-type: x mandatory;
        }
        .nav-buttons::-webkit-scrollbar {
            height: 3px;
        }
        .nav-btn {
            flex: 0 0 auto;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(2px);
            border: none;
            border-radius: 40px;
            padding: 10px 18px;
            font-size: 0.9rem;
            font-weight: 500;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            scroll-snap-align: start;
            white-space: nowrap;
        }
        .nav-btn.active {
            background: white;
            color: var(--primary-color);
            font-weight: 700;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .nav-btn:active {
            transform: scale(0.96);
            background: rgba(255,255,255,0.35);
        }

        /* 主要内容区 — 手机改为垂直堆叠 */
        .main-content {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* ---------- 左侧菜品卡片 (手机全宽) ---------- */
        .menu-list {
            background: white;
            border-radius: var(--card-radius);
            box-shadow: var(--shadow-sm);
            padding: 16px 14px;
            width: 100%;
        }

        .menu-list h2 {
            font-size: 1.2rem;
            color: var(--primary-color);
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid #eef2ff;
        }

        .add-dish-btn {
            background: var(--success-color);
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            color: white;
            font-size: 0.75rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
        }
        .add-dish-btn:active {
            transform: scale(0.96);
            background: #1f6e32;
        }

        /* 添加表单 */
        .add-dish-form {
            margin: 12px 0 16px;
            background: #f1f5f9;
            border-radius: 28px;
            padding: 10px;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .new-dish-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 40px;
            font-size: 0.9rem;
            background: white;
        }
        .add-dish-submit {
            background: var(--primary-color);
            border: none;
            padding: 10px 18px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .add-dish-submit:active {
            background: #2c5282;
        }

        /* 菜品列表网格样式 (触屏友好) */
        #dish-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            max-height: 280px;
            overflow-y: auto;
            padding: 4px 0;
        }
        .dish-item {
            background: #f8fafc;
            border-radius: 60px;
            padding: 10px 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.1s linear;
            border: 1px solid #e2edf2;
            font-size: 0.9rem;
            font-weight: 500;
            color: #1e293b;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }
        .dish-item:active {
            background: var(--primary-color);
            color: white;
            transform: scale(0.96);
            border-color: var(--primary-color);
        }
        .dish-name {
            white-space: nowrap;
        }

        /* ---------- 右侧编辑器区域 ---------- */
        .editor-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .editor-container {
            background: white;
            border-radius: var(--card-radius);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
        }
        .editor-box {
            display: none;
            padding: 16px;
            flex-direction: column;
        }
        .editor-box.active {
            display: flex;
        }
        .editor-box h2 {
            font-size: 1.1rem;
            margin-bottom: 12px;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }
        .editor-textarea {
            width: 100%;
            min-height: 280px;
            padding: 14px;
            border: 1px solid #e2e8f0;
            border-radius: 24px;
            font-size: 1rem;
            font-family: 'SF Mono', 'Courier New', monospace;
            line-height: 1.5;
            background: #fefefe;
            resize: vertical;
            transition: 0.1s;
        }
        .editor-textarea:focus {
            border-color: var(--primary-color);
            outline: none;
            box-shadow: 0 0 0 3px rgba(74, 111, 165, 0.2);
        }

        /* 底部操作按钮组 — 网格布局，适合手指点击 */
        .action-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 12px;
            margin-top: 4px;
        }
        .btn {
            background: white;
            border: none;
            border-radius: 60px;
            padding: 12px 8px;
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: all 0.15s;
            color: #2d3e5f;
            border: 1px solid #e9eef3;
        }
        .btn:active {
            transform: scale(0.96);
            background: #f1f5f9;
        }
        .copy-btn { background: #eef2ff; color: #2c3e66; }
        .export-btn { background: #e0f2fe; color: #0f5b7a; }
        .import-btn { background: #f1f5f9; color: #2c5a2e; }
        .clear-btn { background: #ffe9e9; color: #b91c1c; }
        .file-input-container {
            position: relative;
        }
        #file-input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        /* 小型手机适配 */
        @media (max-width: 480px) {
            body {
                padding: 8px 10px 20px;
            }
            .navbar h1 {
                font-size: 1.2rem;
            }
            .nav-btn {
                padding: 8px 14px;
                font-size: 0.8rem;
            }
            .dish-item {
                padding: 8px 14px;
                font-size: 0.85rem;
            }
            .editor-textarea {
                min-height: 240px;
                font-size: 0.9rem;
            }
            .btn {
                padding: 10px 6px;
                font-size: 0.75rem;
            }
        }

        /* 保证所有可点击元素舒适 */
        button, .dish-item, .add-dish-submit, .nav-btn {
            touch-action: manipulation;
        }
        footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.7rem;
            color: #7c8ea0;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 导航栏 (分类快速切换) -->
    <nav class="navbar">
        <h1><i class="fas fa-receipt"></i> 开菜单 · 移动助手</h1>
        <div class="nav-buttons">
            <button class="nav-btn active" data-category="meat">肉类</button>
            <button class="nav-btn" data-category="frozen">冻品</button>
            <button class="nav-btn" data-category="cold">凉菜</button>
            <button class="nav-btn" data-category="vegetables">蔬菜</button>
            <button class="nav-btn" data-category="tofu">豆制品</button>
            <button class="nav-btn" data-category="shrimp">虾类</button>
            <button class="nav-btn" data-category="liuyang">浏阳</button>
            <button class="nav-btn" data-category="beef">牛肉</button>
        </div>
    </nav>

    <div class="main-content">
        <!-- 左侧菜品库 (手机全宽) -->
        <div class="menu-list">
            <h2>
                <span><i class="fas fa-egg"></i> 快捷选品</span>
                <button id="toggle-form-btn" class="add-dish-btn"><i class="fas fa-plus-circle"></i> 添加菜品</button>
            </h2>
            <div id="add-dish-form" class="add-dish-form" style="display: none;">
                <input type="text" id="new-dish-input" placeholder="例如：五花肉" class="new-dish-input">
                <button id="add-dish-btn" class="add-dish-submit">保存</button>
            </div>
            <div id="dish-list">
                <!-- 菜品列表动态渲染 -->
            </div>
        </div>

        <!-- 右侧编辑区 (菜单记录本) -->
        <div class="editor-section">
            <div class="editor-container">
                <div class="editor-box active" data-category="meat">
                    <h2><i class="fas fa-drumstick-bite"></i> 肉类 · 开菜单</h2>
                    <textarea class="editor-textarea" id="meat-editor" placeholder="点击左侧菜品快速添加“菜品名 斤”，也可直接编辑..."></textarea>
                </div>
                <div class="editor-box" data-category="frozen">
                    <h2><i class="fas fa-snowflake"></i> 冻品 · 开菜单</h2>
                    <textarea class="editor-textarea" id="frozen-editor" placeholder="点击左侧菜品快速添加..."></textarea>
                </div>
                <div class="editor-box" data-category="cold">
                    <h2><i class="fas fa-temperature-low"></i> 凉菜 · 开菜单</h2>
                    <textarea class="editor-textarea" id="cold-editor" placeholder="点击左侧菜品快速添加..."></textarea>
                </div>
                <div class="editor-box" data-category="vegetables">
                    <h2><i class="fas fa-leaf"></i> 蔬菜 · 开菜单</h2>
                    <textarea class="editor-textarea" id="vegetables-editor" placeholder="点击左侧菜品快速添加..."></textarea>
                </div>
                <div class="editor-box" data-category="tofu">
                    <h2><i class="fas fa-cheese"></i> 豆制品 · 开菜单</h2>
                    <textarea class="editor-textarea" id="tofu-editor" placeholder="点击左侧菜品快速添加..."></textarea>
                </div>
                <div class="editor-box" data-category="shrimp">
                    <h2><i class="fas fa-fish"></i> 虾类 · 开菜单</h2>
                    <textarea class="editor-textarea" id="shrimp-editor" placeholder="点击左侧菜品快速添加..."></textarea>
                </div>
                <div class="editor-box" data-category="liuyang">
                    <h2><i class="fas fa-fire"></i> 浏阳蒸菜 · 开菜单</h2>
                    <textarea class="editor-textarea" id="liuyang-editor" placeholder="点击左侧菜品快速添加..."></textarea>
                </div>
                <div class="editor-box" data-category="beef">
                    <h2><i class="fas fa-cow"></i> 牛肉 · 开菜单</h2>
                    <textarea class="editor-textarea" id="beef-editor" placeholder="点击左侧菜品快速添加..."></textarea>
                </div>
            </div>

            <!-- 底部多功能按钮组 -->
            <div class="action-buttons">
                <button class="btn copy-btn" id="copy-btn"><i class="fas fa-copy"></i> 复制总单</button>
                <button class="btn export-btn" id="export-btn"><i class="fas fa-download"></i> 导出菜品库</button>
                <div class="file-input-container">
                    <label for="file-input" class="btn import-btn" style="display: flex;"><i class="fas fa-upload"></i> 导入菜品库</label>
                    <input type="file" id="file-input" accept=".json">
                </div>
                <button class="btn clear-btn" id="clear-btn"><i class="fas fa-trash-alt"></i> 清空编辑区</button>
            </div>
        </div>
    </div>
    <footer>
        <i class="fas fa-hand-pointer"></i> 点击菜品快速录入 · 用量支持手动修改
    </footer>
</div>

<script>
    // ---------- 数据结构 ----------
    // 菜品库 (每个分类下的菜品数组)
    const dishes = {
        meat: [],
        frozen: [],
        cold: [],
        vegetables: [],
        tofu: [],
        shrimp: [],
        liuyang: [],
        beef: []
    };

    // 分类标题映射 (用于复制功能)
    const categoryTitles = {
        meat: '#肉类\n@老张',
        frozen: '#冻品\n@A玲荣冻品13661757249 陈*皇',
        cold: '#凉菜\n@申鼎 片皮烤鸭.卤味18616155380',
        vegetables: '#蔬菜\n@富华',
        tofu: '#豆制品\n@虹珠豆制品',
        shrimp: '#虾类\n@若无执念在心头  人生何处不清欢',
        liuyang: '#浏阳\n@甄友魏  客服',
        beef: '#牛肉\n@A  小陈冷冻品牛羊肉15021797418\n@玲'
    };

    // 编辑器元素引用
    const editors = {
        meat: document.getElementById('meat-editor'),
        frozen: document.getElementById('frozen-editor'),
        cold: document.getElementById('cold-editor'),
        vegetables: document.getElementById('vegetables-editor'),
        tofu: document.getElementById('tofu-editor'),
        shrimp: document.getElementById('shrimp-editor'),
        liuyang: document.getElementById('liuyang-editor'),
        beef: document.getElementById('beef-editor')
    };

    let currentCategory = 'meat';

    // ---------- 辅助函数 ----------
    function saveToLocalStorage() {
        // 保存菜品库
        localStorage.setItem('kaidan_dishes_v2', JSON.stringify(dishes));
        // 保存所有编辑框内容
        const editorContent = {};
        for (let cat in editors) {
            editorContent[cat] = editors[cat].value;
        }
        localStorage.setItem('kaidan_editor_v2', JSON.stringify(editorContent));
    }

    function loadFromLocalStorage() {
        // 加载菜品库
        const savedDishes = localStorage.getItem('kaidan_dishes_v2');
        if (savedDishes) {
            try {
                const parsed = JSON.parse(savedDishes);
                for (let key in parsed) {
                    if (dishes.hasOwnProperty(key) && Array.isArray(parsed[key])) {
                        dishes[key] = parsed[key];
                    }
                }
            } catch(e) { console.warn(e); }
        }
        // 加载编辑框内容
        const savedEditor = localStorage.getItem('kaidan_editor_v2');
        if (savedEditor) {
            try {
                const editorContent = JSON.parse(savedEditor);
                for (let cat in editorContent) {
                    if (editors[cat]) editors[cat].value = editorContent[cat];
                }
            } catch(e) {}
        }
        // 确保每个分类都有数组，若空则使用默认示例数据（让初次使用不空）
        let needDefault = true;
        for (let key in dishes) {
            if (dishes[key] && dishes[key].length > 0) { needDefault = false; break; }
        }
        if (needDefault) {
            initDefaultDishes();
        }
    }

    // 预置常用菜品，提升手机端体验
    function initDefaultDishes() {
        dishes.meat = ['猪肉', '五花肉', '排骨', '鸡腿', '鸭肉'];
        dishes.frozen = ['冻鸡翅', '冻虾仁', '冻带鱼', '冻牛肉卷'];
        dishes.cold = ['拍黄瓜', '凉拌木耳', '酱牛肉', '口水鸡'];
        dishes.vegetables = ['青菜', '土豆', '茄子', '西红柿', '青椒'];
        dishes.tofu = ['嫩豆腐', '香干', '油豆腐', '豆皮'];
        dishes.shrimp = ['基围虾', '小龙虾仁', '虾滑'];
        dishes.liuyang = ['蒸火焙鱼', '腊味合蒸', '醋蒸鸡', '浏阳豆豉'];
        dishes.beef = ['牛腩', '牛里脊', '肥牛卷', '牛腱子'];
        saveToLocalStorage();
    }

    // 渲染当前分类的菜品列表 (手机版用胶囊标签)
    function renderDishes(category) {
        const dishContainer = document.getElementById('dish-list');
        if (!dishContainer) return;
        const categoryDishes = dishes[category] || [];
        dishContainer.innerHTML = '';
        if (categoryDishes.length === 0) {
            const emptyTip = document.createElement('div');
            emptyTip.textContent = '暂无菜品，点击“添加菜品”';
            emptyTip.style.width = '100%';
            emptyTip.style.padding = '12px';
            emptyTip.style.textAlign = 'center';
            emptyTip.style.color = '#8ba0bc';
            emptyTip.style.fontSize = '0.8rem';
            dishContainer.appendChild(emptyTip);
            return;
        }
        categoryDishes.forEach(dish => {
            const dishEl = document.createElement('div');
            dishEl.className = 'dish-item';
            const nameSpan = document.createElement('span');
            nameSpan.className = 'dish-name';
            nameSpan.textContent = dish;
            dishEl.appendChild(nameSpan);
            // 点击添加菜品名+空格+斤 到对应的编辑框
            dishEl.addEventListener('click', (e) => {
                e.stopPropagation();
                const activeEditor = editors[currentCategory];
                if (activeEditor) {
                    let currentVal = activeEditor.value;
                    // 自动加上换行 格式 “菜品名 斤”
                    let newLine = `${dish} 斤`;
                    if (currentVal && !currentVal.endsWith('\n')) newLine = '\n' + newLine;
                    activeEditor.value = currentVal + newLine;
                    activeEditor.focus();
                    saveToLocalStorage();
                    // 可选轻提示（不干扰）
                }
            });
            dishContainer.appendChild(dishEl);
        });
    }

    // 切换分类
    function switchCategory(category) {
        currentCategory = category;
        // 更新导航按钮样式
        document.querySelectorAll('.nav-btn').forEach(btn => {
            if (btn.dataset.category === category) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
        // 显示对应的编辑器区域
        document.querySelectorAll('.editor-box').forEach(box => {
            if (box.dataset.category === category) {
                box.classList.add('active');
            } else {
                box.classList.remove('active');
            }
        });
        // 重新渲染左侧菜品
        renderDishes(category);
    }

    // 新增菜品
    function addNewDish() {
        const inputEl = document.getElementById('new-dish-input');
        const dishName = inputEl.value.trim();
        if (!dishName) {
            alert('请输入菜品名称');
            return;
        }
        if (!dishes[currentCategory]) dishes[currentCategory] = [];
        // 避免重复添加（简单去重提醒）
        if (dishes[currentCategory].includes(dishName)) {
            alert('该菜品已存在');
            return;
        }
        dishes[currentCategory].push(dishName);
        saveToLocalStorage();
        renderDishes(currentCategory);
        inputEl.value = '';
        // 自动隐藏表单（可选）
        document.getElementById('add-dish-form').style.display = 'none';
    }

    // 显示/隐藏添加菜品表单
    function toggleAddForm() {
        const form = document.getElementById('add-dish-form');
        if (form.style.display === 'none' || getComputedStyle(form).display === 'none') {
            form.style.display = 'flex';
            document.getElementById('new-dish-input').focus();
        } else {
            form.style.display = 'none';
        }
    }

    // 复制全部编辑内容（带分类标题，完整报表）
    function copyFullContent() {
        let combined = '';
        for (let cat in editors) {
            const content = editors[cat].value.trim();
            if (content) {
                if (categoryTitles[cat]) combined += categoryTitles[cat] + '\n';
                combined += content + '\n\n';
            }
        }
        if (!combined.trim()) {
            alert('所有开菜单内容为空，无内容可复制');
            return;
        }
        navigator.clipboard.writeText(combined).then(() => {
            alert('✓ 已复制完整开菜单，可粘贴到微信/文档');
        }).catch(() => {
            alert('复制失败，可手动选择文本');
        });
    }

    // 导出菜品库(JSON)
    function exportDishes() {
        const dataStr = JSON.stringify(dishes, null, 2);
        const blob = new Blob([dataStr], {type: 'application/json'});
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.href = url;
        link.download = `菜品库_${new Date().toISOString().slice(0,19)}.json`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
    }

    // 导入菜品库 (覆盖合并)
    function importDishes(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const imported = JSON.parse(e.target.result);
                if (imported && typeof imported === 'object') {
                    for (let key in dishes) {
                        if (imported[key] && Array.isArray(imported[key])) {
                            dishes[key] = imported[key];
                        }
                    }
                    saveToLocalStorage();
                    renderDishes(currentCategory);
                    alert('菜品库导入成功');
                } else {
                    throw new Error('格式错误');
                }
            } catch (err) {
                alert('文件解析失败，请选择正确的JSON文件');
            }
            // 清空input，允许重复导入同一文件
            event.target.value = '';
        };
        reader.readAsText(file);
    }

    // 清空所有编辑框内容
    function clearAllEditors() {
        if (confirm('确定清空所有分类下的开菜单内容吗？数据不可恢复。')) {
            for (let cat in editors) {
                editors[cat].value = '';
            }
            saveToLocalStorage();
            alert('已清空所有编辑框');
        }
    }

    // 监听编辑器内容改动自动保存
    function bindAutoSave() {
        for (let cat in editors) {
            editors[cat].addEventListener('input', () => saveToLocalStorage());
        }
    }

    // 页面初始化
    window.onload = () => {
        loadFromLocalStorage();

        // 绑定UI事件
        const navBtns = document.querySelectorAll('.nav-btn');
        navBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                const cat = btn.dataset.category;
                if (cat) switchCategory(cat);
            });
        });

        document.getElementById('toggle-form-btn')?.addEventListener('click', toggleAddForm);
        document.getElementById('add-dish-btn')?.addEventListener('click', addNewDish);
        document.getElementById('copy-btn')?.addEventListener('click', copyFullContent);
        document.getElementById('export-btn')?.addEventListener('click', exportDishes);
        document.getElementById('clear-btn')?.addEventListener('click', clearAllEditors);
        const fileInput = document.getElementById('file-input');
        if (fileInput) fileInput.addEventListener('change', importDishes);

        bindAutoSave();

        // 激活默认分类肉类
        switchCategory('meat');

        // 额外处理：如果当前编辑器内容为空，展示友好示例提示
        if (!editors.meat.value.trim()) {
            // 肉类的举例引导，不覆盖用户已有数据
            if (dishes.meat.length) {
                editors.meat.placeholder = '点击左侧「肉类」菜品快速录入，例如点击“猪肉”';
            }
        }
    };
</script>
</body>
</html>
