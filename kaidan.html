<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>开菜单 · 专业分类点单助手</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
    :root {
            --primary-color: #4a6fa5;
            --secondary-color: #6b8cbc;
            --accent-color: #ff7e5f;
            --light-color: #f8f9fa;
            --dark-color: #343a40;
            --success-color: #28a745;
            --danger-color: #dc3545;
            --warning-color: #ffc107;
            --info-color: #17a2b8;
            --border-radius: 8px;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            --gap: 20px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 基础高度控制 - 满屏最大高度利用 */
        html, body {
            height: 100%;
            overflow: hidden;
            background-color: #f0f2f5;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, 'Helvetica Neue', sans-serif;
            color: #1e2a3e;
        }

        /* 主容器: 垂直 flex, 占据全屏, 无外部滚动 (内部滚动由子区域负责) */
        .container {
            height: 100%;
            display: flex;
            flex-direction: column;
            max-width: 1400px;
            margin: 0 auto;
            padding: 16px 20px 20px 20px;
            gap: 16px;
            background-color: #f0f2f5;
        }

        /* 导航栏样式 */
        .navbar {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 10px 15px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            margin-bottom: var(--gap);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .navbar h1 {
            font-size: 1.2rem;
            margin: 0;
            text-align: center;
        }
        
        .nav-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            overflow-x: auto;
            padding-bottom: 5px;
        }
        
        .nav-btn {
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            border-radius: 4px;
            padding: 6px 12px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.8rem;
            white-space: nowrap;
        }
        
        .nav-btn:hover {
            background-color: rgba(255, 255, 255, 0.3);
        }
        
        .nav-btn.active {
            background-color: white;
            color: var(--primary-color);
            font-weight: bold;
        }
        

        /* 核心内容区: 左右并排 + 弹性撑满 */
        .main-content {
            flex: 1;
            min-height: 0;  /* flex限制溢出 */
            display: flex;
            gap: 5px;
            flex-wrap: nowrap;
        }

        /* 左侧菜单列表 (菜品库) */
        .menu-list {
            flex: 0 0 200px;
            background: white;
            border-radius: 28px;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.2s;
        }

        .menu-list h2 {
            background: #f8fafc;
            margin: 0;
            padding: 16px 18px 12px;
            font-size: 1.1rem;
            color: #1f4b6e;
            border-bottom: 2px solid #e2edf2;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .menu-list h2 i {
            color: #2c6e9e;
        }

        #toggle-form-btn {
            background: #27ae60;
            border: none;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 500;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        #toggle-form-btn:hover {
            background: #2ecc71;
            transform: scale(0.97);
        }

        .add-dish-form {
            background: #f9fbfd;
            padding: 2px 1px;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            gap: 0px;
            align-items: center;
        }

        .new-dish-input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #cfdfe8;
            border-radius: 30px;
            font-size: 0.85rem;
            outline: none;
            transition: 0.2s;
        }

        .new-dish-input:focus {
            border-color: #2c6e9e;
            box-shadow: 0 0 0 2px rgba(44,110,158,0.2);
        }

        .add-dish-submit {
            background: #2c6e9e;
            border: none;
            border-radius: 30px;
            padding: 6px 18px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }

        .add-dish-submit:hover {
            background: #1f4b6e;
        }

        /* 菜品列表滚动区 */
        #dish-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .dish-item {
            background: #ffffff;
            border-radius: 20px;
            padding: 10px 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #eef2f6;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }

        .dish-item:hover {
            background: #eef5fc;
            transform: translateX(3px);
            border-color: #bdd4e8;
        }

        .dish-name {
            font-size: 0.9rem;
            font-weight: 500;
            color: #1e2f3d;
        }

        /* 右侧编辑区 (弹性最大高度) */
        .editor-section {
            flex: 1;
            min-width: 200px;
            display: flex;
            flex-direction: column;
            gap: 0;
            height: 100%;
        }

        .editor-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
            border-radius: 28px;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        .editor-box {
            display: none;
            flex-direction: column;
            height: 100%;
            padding: 18px 18px 16px;
        }

        .editor-box.active {
            display: flex;
        }

        .editor-box h2 {
            font-size: 1.15rem;
            margin-bottom: 14px;
            color: #1f4b6e;
            border-left: 4px solid #f39c12;
            padding-left: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .editor-textarea {
            flex: 1;
            width: 100%;
            padding: 16px;
            border: 1px solid #dce5ec;
            border-radius: 24px;
            font-family: 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
            font-size: 0.9rem;
            line-height: 1.5;
            resize: none;
            background: #fefefe;
            transition: 0.2s;
            outline: none;
        }

        .editor-textarea:focus {
            border-color: #2c6e9e;
            box-shadow: 0 0 0 3px rgba(44,110,158,0.15);
            background: white;
        }

        /* 底部按钮行 : 一行四个按钮, 整齐统一 */
        .action-buttons {
            flex-shrink: 0;
            display: flex;
            gap: 12px;
            justify-content: space-between;
            align-items: stretch;
            margin-top: 8px;
            flex-wrap: nowrap;
            overflow-x: auto;
            padding-bottom: 2px;
            scrollbar-width: thin;
        }

        .btn {
            flex: 1;
            min-width: 85px;
            padding: 10px 6px;
            border-radius: 44px;
            font-size: 0.85rem;
            font-weight: 600;
            text-align: center;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: white;
            color: #1e4663;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            border: 1px solid #d4e0e9;
        }

        .btn i {
            font-size: 1rem;
        }

        .copy-btn {
            background: #2c6e9e;
            border: none;
            color: white;
            box-shadow: 0 4px 8px rgba(44,110,158,0.2);
        }

        .export-btn {
            background: #27ae60;
            border: none;
            color: white;
        }

        .import-btn {
            background: #e67e22;
            border: none;
            color: white;
        }

        .clear-btn {
            background: #e74c3c;
            border: none;
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .file-input-container {
            position: relative;
            flex: 1;
        }

        #file-input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        /* 响应式调整：左侧稍窄仍然舒适 */
        @media (max-width: 780px) {
            .container {
                padding: 12px;
                gap: 12px;
            }
            .menu-list {
                flex: 0 0 180px;
            }
            .btn {
                font-size: 0.7rem;
                padding: 4px 4px;
                gap: 4px;
            }
            .nav-btn {
                padding: 5px 8px;
                font-size: 0.75rem;
            }
            .dish-name {
                font-size: 0.8rem;
            }
            .editor-textarea {
                font-size: 0.8rem;
            }
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #e9ecef;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #b9cfdf;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #8fb2ca;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 顶部导航 -->
    <nav class="navbar">
        <h1><i class="fas fa-clipboard-list"></i> 开菜单 · 厨政快手</h1>
        <div class="nav-buttons">
            <button class="nav-btn active" data-category="meat"><i class="fas fa-drumstick-bite"></i> 肉类</button>
            <button class="nav-btn" data-category="frozen"><i class="fas fa-snowflake"></i> 冻品</button>
            <button class="nav-btn" data-category="cold"><i class="fas fa-temperature-low"></i> 凉菜</button>
            <button class="nav-btn" data-category="vegetables"><i class="fas fa-leaf"></i> 蔬菜</button>
            <button class="nav-btn" data-category="tofu"><i class="fas fa-cheese"></i> 豆制品</button>
            <button class="nav-btn" data-category="shrimp"><i class="fas fa-shrimp"></i> 虾类</button>
            <button class="nav-btn" data-category="liuyang"><i class="fas fa-fire"></i> 浏阳</button>
            <button class="nav-btn" data-category="beef"><i class="fas fa-cow"></i> 牛肉</button>
        </div>
    </nav>

    <!-- 主区域：左右最大高度自适应 -->
    <div class="main-content">
        <!-- 左侧菜品库 -->
        <div class="menu-list">
            <h2><i class="fas fa-utensils"></i> 菜品库
                <button id="toggle-form-btn" class="add-dish-btn"><i class="fas fa-plus-circle"></i> 添菜</button>
            </h2>
            <div id="add-dish-form" class="add-dish-form" style="display: none;">
                <input type="text" id="new-dish-input" placeholder="新菜名, 例如:黄牛肉" class="new-dish-input">
                <button id="add-dish-btn" class="add-dish-submit">保存</button>
            </div>
            <div id="dish-list">
                <!-- 动态菜品列表 -->
            </div>
        </div>

        <!-- 右侧多分类编辑区 -->
        <div class="editor-section">
            <div class="editor-container">
                <div class="editor-box active" data-category="meat">
                    <h2><i class="fas fa-drumstick-bite"></i> 肉类 · 采购单</h2>
                    <textarea class="editor-textarea" id="meat-editor" placeholder="点击左侧【肉类】菜品快速添加，也可手动录入数量规格…"></textarea>
                </div>
                <div class="editor-box" data-category="frozen">
                    <h2><i class="fas fa-snowflake"></i> 冻品 · 采购单</h2>
                    <textarea class="editor-textarea" id="frozen-editor" placeholder="冻品类目点击添加…"></textarea>
                </div>
                <div class="editor-box" data-category="cold">
                    <h2><i class="fas fa-temperature-low"></i> 凉菜 · 采购单</h2>
                    <textarea class="editor-textarea" id="cold-editor" placeholder="凉菜清单…"></textarea>
                </div>
                <div class="editor-box" data-category="vegetables">
                    <h2><i class="fas fa-leaf"></i> 蔬菜 · 采购单</h2>
                    <textarea class="editor-textarea" id="vegetables-editor" placeholder="时蔬清单…"></textarea>
                </div>
                <div class="editor-box" data-category="tofu">
                    <h2><i class="fas fa-cheese"></i> 豆制品 · 采购单</h2>
                    <textarea class="editor-textarea" id="tofu-editor" placeholder="豆制品清单…"></textarea>
                </div>
                <div class="editor-box" data-category="shrimp">
                    <h2><i class="fas fa-fish"></i> 虾类 · 采购单</h2>
                    <textarea class="editor-textarea" id="shrimp-editor" placeholder="虾类清单…"></textarea>
                </div>
                <div class="editor-box" data-category="liuyang">
                    <h2><i class="fas fa-fire"></i> 浏阳蒸菜 · 采购单</h2>
                    <textarea class="editor-textarea" id="liuyang-editor" placeholder="浏阳特色…"></textarea>
                </div>
                <div class="editor-box" data-category="beef">
                    <h2><i class="fas fa-cow"></i> 牛肉 · 采购单</h2>
                    <textarea class="editor-textarea" id="beef-editor" placeholder="牛肉分类清单…"></textarea>
                </div>
            </div>
        </div>
    </div>

    <!-- 底部四个按钮行 - 独立横跨左右 -->
    <div class="action-buttons">
        <button class="btn copy-btn" id="copy-btn"><i class="fas fa-copy"></i> 复制清单</button>
        <button class="btn export-btn" id="export-btn"><i class="fas fa-download"></i> 导出菜品库</button>
        <div class="file-input-container">
            <label for="file-input" class="btn import-btn"><i class="fas fa-upload"></i> 导入菜品库</label>
            <input type="file" id="file-input" accept=".json">
        </div>
        <button class="btn clear-btn" id="clear-btn"><i class="fas fa-trash-alt"></i> 清空编辑区</button>
    </div>
</div>

<script>
    // ---------- 1. 数据结构 ----------
    // 预置菜品库（精美实用示例数据）
    const dishes = {
        meat: ["五花肉", "精瘦肉", "鸡块", "鸭腿", "猪蹄", "腊肉"],
        frozen: ["冻虾仁", "冻鸡翅中", "冻鸭掌", "冻鱿鱼须", "冻玉米粒"],
        cold: ["拍黄瓜", "凉拌木耳", "红油耳丝", "口水鸡", "皮蛋豆腐"],
        vegetables: ["土豆", "西红柿", "青椒", "茄子", "油麦菜", "西兰花", "娃娃菜"],
        tofu: ["老豆腐", "嫩豆腐", "豆腐皮", "香干", "油豆腐"],
        shrimp: ["基围虾", "小龙虾尾", "鲜虾仁", "竹节虾"],
        liuyang: ["蒸腊肉", "蒸排骨", "蒸火焙鱼", "盐菜扣肉", "浏阳豆豉辣椒"],
        beef: ["牛里脊", "牛腩", "牛腱子", "肥牛卷", "雪花牛肉"]
    };

    // 分类标题（用于复制时保持专业报单格式）
    const categoryTitles = {
        meat: '#肉类\n@老张',
        frozen: '#冻品\n@A玲荣冻品13661757249 陈*皇',
        cold: '#凉菜\n@申鼎 片皮烤鸭·卤味18616155380',
        vegetables: '#蔬菜\n@富华',
        tofu: '#豆制品\n@虹珠豆制品',
        shrimp: '#虾类\n@若无执念在心头  人生何处不清欢',
        liuyang: '#浏阳\n@甄友魏  客服',
        beef: '#牛肉\n@A  小陈冷冻品牛羊肉15021797418\n@玲'
    };

    let currentCategory = 'meat';

    // DOM 元素
    const dishListDiv = document.getElementById('dish-list');
    const editors = {
        meat: document.getElementById('meat-editor'),
        frozen: document.getElementById('frozen-editor'),
        cold: document.getElementById('cold-editor'),
        vegetables: document.getElementById('vegetables-editor'),
        tofu: document.getElementById('tofu-editor'),
        shrimp: document.getElementById('shrimp-editor'),
        liuyang: document.getElementById('liuyang-editor'),
        beef: document.getElementById('beef-editor')
    };

    // ---------- 辅助函数: 存储与加载 ----------
    function saveToLocalStorage() {
        localStorage.setItem('kaidan_dishes', JSON.stringify(dishes));
        const editorContent = {};
        for (const [cat, editor] of Object.entries(editors)) {
            editorContent[cat] = editor.value;
        }
        localStorage.setItem('kaidan_editorContent', JSON.stringify(editorContent));
        localStorage.setItem('kaidan_currentCategory', currentCategory);
    }

    function loadFromLocalStorage() {
        // 加载菜品库
        const savedDishes = localStorage.getItem('kaidan_dishes');
        if (savedDishes) {
            try {
                const parsed = JSON.parse(savedDishes);
                // 合并保留原有结构完整性
                Object.keys(parsed).forEach(cat => {
                    if (dishes[cat] !== undefined) {
                        dishes[cat] = parsed[cat];
                    }
                });
            } catch(e) { console.warn(e); }
        } else {
            // 如果没有存储，使用预置默认并保存一次默认
            saveToLocalStorage();
        }

        // 加载编辑区内容
        const savedEditor = localStorage.getItem('kaidan_editorContent');
        if (savedEditor) {
            try {
                const editorVals = JSON.parse(savedEditor);
                for (const [cat, val] of Object.entries(editorVals)) {
                    if (editors[cat]) editors[cat].value = val;
                }
            } catch(e) {}
        }

        const savedCat = localStorage.getItem('kaidan_currentCategory');
        if (savedCat && editors[savedCat]) currentCategory = savedCat;
    }

    // 渲染左侧当前分类菜品列表
    function renderDishes() {
        if (!dishListDiv) return;
        dishListDiv.innerHTML = '';
        const categoryDishes = dishes[currentCategory] || [];
        if (categoryDishes.length === 0) {
            const emptyTip = document.createElement('div');
            emptyTip.className = 'dish-item';
            emptyTip.innerHTML = '<span class="dish-name" style="color:#aaa;">暂无菜品，点击“添菜”</span>';
            dishListDiv.appendChild(emptyTip);
            return;
        }
        categoryDishes.forEach((dish, idx) => {
            const dishItem = document.createElement('div');
            dishItem.className = 'dish-item';
            dishItem.innerHTML = `<span class="dish-name"><i class="fas fa-plus-circle" style="font-size:0.7rem; margin-right:6px; color:#f39c12;"></i>${dish}</span>`;
            dishItem.addEventListener('click', (e) => {
                e.stopPropagation();
                const editor = editors[currentCategory];
                if (editor) {
                    let newVal = editor.value;
                    newVal += `${dish} 斤\n`;
                    editor.value = newVal;
                    editor.focus();
                    saveToLocalStorage();
                }
            });
            dishListDiv.appendChild(dishItem);
        });
    }

    // 切换分类 
    function switchCategory(category) {
        currentCategory = category;
        // 更新导航按钮样式
        document.querySelectorAll('.nav-btn').forEach(btn => {
            if (btn.dataset.category === category) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
        // 切换右侧编辑区激活
        document.querySelectorAll('.editor-box').forEach(box => {
            if (box.dataset.category === category) {
                box.classList.add('active');
            } else {
                box.classList.remove('active');
            }
        });
        renderDishes();
        saveToLocalStorage();
    }

    // 添加菜品逻辑
    function addNewDish() {
        const inputEl = document.getElementById('new-dish-input');
        const newName = inputEl.value.trim();
        if (!newName) {
            alert('请输入菜品名称');
            return;
        }
        if (!dishes[currentCategory]) dishes[currentCategory] = [];
        if (dishes[currentCategory].includes(newName)) {
            alert('该菜品已存在！');
            return;
        }
        dishes[currentCategory].push(newName);
        renderDishes();
        inputEl.value = '';
        saveToLocalStorage();
        alert(`✅ 添加成功：“${newName}” 至 ${currentCategory} 类`);
    }

    // ---------- 功能按钮核心 ----------
    // 复制所有编辑区内容（带分类抬头，精致订单）
    function copyAllContent() {
        let finalText = '';
        const categoriesInOrder = ['meat', 'frozen', 'cold', 'vegetables', 'tofu', 'shrimp', 'liuyang', 'beef'];
        for (let cat of categoriesInOrder) {
            const content = editors[cat]?.value.trim();
            if (content && content.length > 0) {
                if (categoryTitles[cat]) {
                    finalText += `${categoryTitles[cat]}\n`;
                } else {
                    finalText += `#${cat}\n`;
                }
                finalText += content + '\n\n';
            } else if (content === '') {
                // 空分类不加任何内容，保持整洁
            }
        }
        if (!finalText) {
            alert('📋 所有采购单为空，没有可复制的内容');
            return;
        }
        navigator.clipboard.writeText(finalText).then(() => {
            alert('✅ 采购清单已复制，可粘贴至微信/表格');
        }).catch(() => {
            alert('❌ 复制失败，可手动选中文本');
        });
    }

    // 导出菜品库 (JSON)
    function exportDishLibrary() {
        const exportData = JSON.stringify(dishes, null, 2);
        const blob = new Blob([exportData], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `kaidan_menulib_${new Date().toISOString().slice(0,19)}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        alert('📦 菜品库已导出');
    }

    // 导入菜品库 (完全替换)
    function importDishLibrary(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const imported = JSON.parse(e.target.result);
                if (imported && typeof imported === 'object') {
                    // 验证关键分类存在性（只要合理就覆盖）
                    for (let key of Object.keys(dishes)) {
                        if (imported[key] && Array.isArray(imported[key])) {
                            dishes[key] = imported[key];
                        }
                    }
                    renderDishes();
                    saveToLocalStorage();
                    alert('✅ 菜品库导入成功！');
                } else {
                    throw new Error('格式不符');
                }
            } catch (err) {
                alert('❌ 导入失败，请确保导入的是正确的菜品库JSON文件');
            }
            event.target.value = ''; // 清空input
        };
        reader.readAsText(file);
    }

    // 清空所有编辑框内容（只清空右侧采购清单，不清除菜品库）
    function clearAllEditors() {
        if (confirm('⚠️ 确定清空所有分类的采购单吗？仅清空输入区，菜品库不受影响。')) {
            for (let editor of Object.values(editors)) {
                editor.value = '';
            }
            saveToLocalStorage();
            alert('🧹 所有采购单已清空');
        }
    }

    // 监听编辑区变化保存
    function bindEditorAutoSave() {
        for (let editor of Object.values(editors)) {
            editor.addEventListener('input', () => saveToLocalStorage());
        }
    }

    // 初始化UI、事件、默认展示
    function init() {
        loadFromLocalStorage();   // 加载已有数据（若无则保留预置）
        // 修正当前分类激活
        const defaultBtn = document.querySelector(`.nav-btn[data-category="${currentCategory}"]`);
        if (!defaultBtn) currentCategory = 'meat';
        switchCategory(currentCategory);
        
        // 导航按钮事件
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const cat = btn.dataset.category;
                if (cat) switchCategory(cat);
            });
        });
        
        // 添加菜品表单逻辑
        const toggleBtn = document.getElementById('toggle-form-btn');
        const addForm = document.getElementById('add-dish-form');
        const addBtn = document.getElementById('add-dish-btn');
        const newInput = document.getElementById('new-dish-input');
        toggleBtn.addEventListener('click', () => {
            if (addForm.style.display === 'none' || addForm.style.display === '') {
                addForm.style.display = 'flex';
            } else {
                addForm.style.display = 'none';
            }
        });
        addBtn.addEventListener('click', addNewDish);
        newInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addNewDish();
        });
        
        // 底部功能按钮
        document.getElementById('copy-btn').addEventListener('click', copyAllContent);
        document.getElementById('export-btn').addEventListener('click', exportDishLibrary);
        document.getElementById('clear-btn').addEventListener('click', clearAllEditors);
        const fileInput = document.getElementById('file-input');
        fileInput.addEventListener('change', importDishLibrary);
        
        bindEditorAutoSave();
        // 手动同步一次渲染确保最新数据展示
        renderDishes();
    }

    init();
</script>
</body>
</html>
