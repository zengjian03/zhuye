<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>谷子情 · 可编辑经营报表</title>
<style>
  :root {
    --bg: #F7F5F2;
    --surface: #FFFFFF;
    --ink: #2D2A26;
    --muted: #8A8580;
    --rule: #D9D3CC;
    --accent: #C05C2E;
    --accent2: #3A7D6E;
    --danger: #C0392B;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:var(--font); background:var(--bg); color:var(--ink); font-size:14px; line-height:1.5; }
  .wrap { max-width:1400px; margin:0 auto; padding:16px; }
  header { text-align:center; padding:20px 0 12px; border-bottom:2px solid var(--rule); margin-bottom:16px; }
  header h1 { font-size:1.6rem; font-weight:700; }
  header p { color:var(--muted); font-size:0.9rem; margin-top:4px; }

  .toolbar { display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-bottom:12px; }
  .toolbar .group { display:flex; gap:6px; align-items:center; }
  .toolbar label { font-size:0.85rem; color:var(--muted); }
  .toolbar select, .toolbar input[type="number"] { padding:6px 10px; border:1px solid var(--rule); border-radius:6px; font-size:0.9rem; background:var(--surface); }
  .toolbar button { padding:6px 14px; border:1px solid var(--rule); border-radius:6px; background:var(--surface); cursor:pointer; font-size:0.85rem; transition:all .15s; }
  .toolbar button:hover { background:var(--accent); color:#fff; border-color:var(--accent); }
  .toolbar button.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
  .toolbar button.primary:hover { opacity:0.9; }
  .toolbar button.danger { background:var(--danger); color:#fff; border-color:var(--danger); }
  .toolbar .status { font-size:0.8rem; color:var(--muted); margin-left:auto; }

  .summary-cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px; margin-bottom:16px; }
  .card { background:var(--surface); border:1px solid var(--rule); border-radius:8px; padding:12px; text-align:center; }
  .card .label { font-size:0.75rem; color:var(--muted); margin-bottom:4px; }
  .card .value { font-size:1.3rem; font-weight:700; }
  .card .value.pos { color:var(--accent2); }
  .card .value.neg { color:var(--danger); }
  .card .value.rev { color:var(--accent); }

  .table-wrap { overflow:auto; border:1px solid var(--rule); border-radius:8px; background:var(--surface); max-height:70vh; }
  table { width:100%; border-collapse:collapse; font-size:0.8rem; min-width:1100px; }
  thead th { position:sticky; top:0; background:var(--ink); color:#fff; padding:8px 6px; font-weight:600; text-align:center; white-space:nowrap; z-index:2; font-size:0.78rem; }
  tbody td { padding:5px 6px; text-align:center; border-bottom:1px solid #EAE5DF; white-space:nowrap; }
  tbody tr:nth-child(even) td { background:#FAF8F5; }
  tbody tr:hover td { background:#F0EBE5; }
  tbody td.day-col { font-weight:600; background:#EDE8E2; position:sticky; left:0; z-index:1; }
  tbody tr:nth-child(even) td.day-col { background:#E5DFD8; }
  tbody td input { width:100%; border:none; background:transparent; text-align:center; font-size:0.8rem; padding:4px 2px; font-family:var(--font); color:var(--ink); }
  tbody td input:focus { outline:2px solid var(--accent); border-radius:3px; background:#FFF8F3; }
  tbody td.total-cell { font-weight:700; background:#EDE8E2; }
  tbody tr:nth-child(even) td.total-cell { background:#E5DFD8; }
  tbody td.profit-pos { color:var(--accent2); font-weight:700; }
  tbody td.profit-neg { color:var(--danger); font-weight:700; }
  tbody td.revenue-cell { color:var(--accent); font-weight:700; }
  tbody tr.total-row td { background:#D5CFC7 !important; font-weight:700; border-top:2px solid var(--accent); }
  tbody tr.total-row td.day-col { background:#C8C2BA !important; }

  .month-summary { margin-top:16px; background:var(--surface); border:1px solid var(--rule); border-radius:8px; padding:14px; }
  .month-summary h3 { font-size:1rem; margin-bottom:10px; border-bottom:1px solid var(--rule); padding-bottom:6px; }
  .month-summary table { min-width:auto; font-size:0.85rem; }
  .month-summary th { background:var(--accent); }
  .month-summary td, .month-summary th { padding:6px 10px; }

  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.4); display:none; align-items:center; justify-content:center; z-index:100; }
  .modal-overlay.active { display:flex; }
  .modal { background:var(--surface); border-radius:10px; padding:20px; width:90%; max-width:500px; max-height:80vh; overflow:auto; }
  .modal h3 { margin-bottom:12px; }
  .modal textarea { width:100%; height:200px; font-family:monospace; font-size:0.8rem; border:1px solid var(--rule); border-radius:6px; padding:8px; resize:vertical; }
  .modal .modal-btns { display:flex; gap:8px; justify-content:flex-end; margin-top:12px; }

  @media (max-width:768px) {
    .toolbar { flex-direction:column; align-items:flex-start; }
    .summary-cards { grid-template-columns:repeat(2,1fr); }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>谷子情 · 可编辑经营报表</h1>
    <p>门店 · 每日支出/收入记录 · 自动统计利润</p>
  </header>

  <div class="toolbar">
    <div class="group">
      <label>年份</label>
      <input type="number" id="yearInput" value="2026" min="2000" max="2100">
    </div>
    <div class="group">
      <label>月份</label>
      <select id="monthSelect"></select>
    </div>
    <div class="group">
      <button class="primary" onclick="saveData()">保存数据</button>
      <button onclick="exportJSON()">导出 JSON</button>
      <button onclick="exportCSV()">导出 CSV</button>
      <button onclick="showImportModal()">导入数据</button>
      <button class="danger" onclick="clearAll()">清空全部</button>
    </div>
    <span class="status" id="statusText">就绪</span>
  </div>

  <div class="summary-cards" id="summaryCards"></div>

  <div class="table-wrap">
    <table id="dataTable">
      <thead id="tableHead"></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <div class="month-summary" id="monthSummary"></div>
</div>

<div class="modal-overlay" id="importModal">
  <div class="modal">
    <h3>导入 JSON 数据</h3>
    <p style="font-size:0.8rem;color:var(--muted);margin-bottom:8px;">粘贴之前导出的 JSON 数据，将覆盖当前所有数据。</p>
    <textarea id="importArea" placeholder='{"2026":{"1":{"1":{"oil":0,"rice":0,...},...},...},...}'></textarea>
    <div class="modal-btns">
      <button onclick="closeImportModal()">取消</button>
      <button class="primary" onclick="doImport()">导入</button>
    </div>
  </div>
</div>

<script>
const CATEGORIES = [
  { key:'oil', label:'油' },
  { key:'rice', label:'米' },
  { key:'frozen', label:'冻货' },
  { key:'pork', label:'猪肉' },
    { key:'fish', label:'鱼虾' },
  { key:'cooked', label:'熟食' },
  { key:'water', label:'平台' },
  { key:'veg', label:'蔬菜' },
  { key:'beef', label:'牛肉' },
  { key:'milk', label:'牛奶' },
  { key:'drink', label:'饮料' },
  { key:'fruit', label:'水果' },
  { key:'box', label:'打包盒' },
    { key:'liuyang', label:'浏阳货' },
  { key:'loss', label:'物件损耗' },
  { key:'fixed', label:'固定开支' },
  { key:'revenue', label:'实收营业额' },
];
const PROFIT_KEY = 'profit';
const STORAGE_KEY = 'guziqing_data_v1';

let currentData = {};
let currentYear = 2026;
let currentMonth = 1;

function daysInMonth(y, m) { return new Date(y, m, 0).getDate(); }

function getData(y, m, d) {
  if (!currentData[y]) currentData[y] = {};
  if (!currentData[y][m]) currentData[y][m] = {};
  if (!currentData[y][m][d]) {
    const obj = {};
    CATEGORIES.forEach(c => obj[c.key] = 0);
    currentData[y][m][d] = obj;
  }
  return currentData[y][m][d];
}

function computeProfit(dayObj) {
  const revenue = dayObj.revenue || 0;
  let cost = 0;
  CATEGORIES.forEach(c => { if (c.key !== 'revenue') cost += (dayObj[c.key] || 0); });
  return revenue - cost;
}

function loadFromStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) currentData = JSON.parse(raw);
  } catch(e) { console.error(e); }
}

function saveToStorage() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(currentData));
  setStatus('已自动保存到本地');
}

function setStatus(msg) {
  const el = document.getElementById('statusText');
  el.textContent = msg;
  setTimeout(() => el.textContent = '就绪', 2000);
}

function initMonthSelect() {
  const sel = document.getElementById('monthSelect');
  sel.innerHTML = '';
  for (let i = 1; i <= 12; i++) {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = i + '月';
    sel.appendChild(opt);
  }
  sel.value = currentMonth;
  sel.onchange = () => { currentMonth = parseInt(sel.value); renderTable(); };
}

function renderTable() {
  const year = parseInt(document.getElementById('yearInput').value) || currentYear;
  currentYear = year;
  const month = currentMonth;
  const days = daysInMonth(year, month);

  // Head
  const thead = document.getElementById('tableHead');
  let h = '<tr><th>日期</th>';
  CATEGORIES.forEach(c => h += '<th>' + c.label + '</th>');
  h += '<th>盈利</th></tr>';
  thead.innerHTML = h;

  // Body
  const tbody = document.getElementById('tableBody');
  let html = '';
  let monthTotals = {};
  CATEGORIES.forEach(c => monthTotals[c.key] = 0);
  let monthProfit = 0;

  for (let d = 1; d <= days; d++) {
    const data = getData(year, month, d);
    const profit = computeProfit(data);
    monthProfit += profit;
    const pClass = profit > 0 ? 'profit-pos' : (profit < 0 ? 'profit-neg' : '');
    html += '<tr><td class="day-col">' + month + '/' + d + '</td>';
    CATEGORIES.forEach((c, idx) => {
      const val = data[c.key] || 0;
      monthTotals[c.key] += val;
      const cellClass = c.key === 'revenue' ? 'revenue-cell' : '';
      html += '<td class="' + cellClass + '"><input type="number" data-y="' + year + '" data-m="' + month + '" data-d="' + d + '" data-key="' + c.key + '" value="' + (val || '') + '" onchange="onCellChange(this)" onkeydown="onCellKey(event,this)"></td>';
    });
    html += '<td class="total-cell ' + pClass + '" id="profit-' + d + '">' + formatNum(profit) + '</td></tr>';
  }

  // Total row
  html += '<tr class="total-row"><td class="day-col">合计</td>';
  CATEGORIES.forEach(c => {
    const v = monthTotals[c.key];
    const cls = c.key === 'revenue' ? 'revenue-cell' : '';
    html += '<td class="total-cell ' + cls + '">' + formatNum(v) + '</td>';
  });
  const totalPClass = monthProfit > 0 ? 'profit-pos' : (monthProfit < 0 ? 'profit-neg' : '');
  html += '<td class="total-cell ' + totalPClass + '">' + formatNum(monthProfit) + '</td></tr>';
  tbody.innerHTML = html;

  renderSummary(year, month, monthTotals, monthProfit);
  renderMonthSummary(year, month);
}

function formatNum(n) {
  if (n === 0 || n === '' || n == null) return '-';
  return n.toLocaleString('zh-CN', { maximumFractionDigits: 0 });
}

function onCellChange(input) {
  const y = parseInt(input.dataset.y);
  const m = parseInt(input.dataset.m);
  const d = parseInt(input.dataset.d);
  const key = input.dataset.key;
  const val = parseFloat(input.value) || 0;
  const data = getData(y, m, d);
  data[key] = val;
  // Recompute profit for this row
  const profit = computeProfit(data);
  const pCell = document.getElementById('profit-' + d);
  if (pCell) {
    pCell.textContent = formatNum(profit);
    pCell.className = 'total-cell ' + (profit > 0 ? 'profit-pos' : (profit < 0 ? 'profit-neg' : ''));
  }
  // Recompute totals
  recomputeTotals(y, m);
  saveToStorage();
}

function onCellKey(e, input) {
  if (e.key === 'Enter') {
    const inputs = Array.from(document.querySelectorAll('#dataTable tbody input'));
    const idx = inputs.indexOf(input);
    if (idx >= 0 && idx < inputs.length - 1) {
      inputs[idx + 1].focus();
      inputs[idx + 1].select();
    }
  }
}

function recomputeTotals(y, m) {
  const days = daysInMonth(y, m);
  let totals = {};
  CATEGORIES.forEach(c => totals[c.key] = 0);
  let totalProfit = 0;
  for (let d = 1; d <= days; d++) {
    const data = getData(y, m, d);
    CATEGORIES.forEach(c => totals[c.key] += (data[c.key] || 0));
    totalProfit += computeProfit(data);
  }
  renderSummary(y, m, totals, totalProfit);
  renderMonthSummary(y, m);
}

function renderSummary(y, m, totals, totalProfit) {
  const el = document.getElementById('summaryCards');
  const revenue = totals.revenue || 0;
  const fixed = totals.fixed || 0;
  let material = 0;
  CATEGORIES.forEach(c => { if (c.key !== 'revenue' && c.key !== 'fixed') material += (totals[c.key] || 0); });
  const rate = revenue > 0 ? (totalProfit / revenue * 100) : 0;
  el.innerHTML =
    '<div class="card"><div class="label">营业额</div><div class="value rev">' + formatNum(revenue) + '</div></div>' +
    '<div class="card"><div class="label">纯利润</div><div class="value ' + (totalProfit >= 0 ? 'pos' : 'neg') + '">' + formatNum(totalProfit) + '</div></div>' +
    '<div class="card"><div class="label">利润率</div><div class="value ' + (rate >= 0 ? 'pos' : 'neg') + '">' + rate.toFixed(1) + '%</div></div>' +
    '<div class="card"><div class="label">固定开支</div><div class="value">' + formatNum(fixed) + '</div></div>' +
    '<div class="card"><div class="label">菜品支出</div><div class="value">' + formatNum(material) + '</div></div>';
}

function renderMonthSummary(y, m) {
  const el = document.getElementById('monthSummary');
  let html = '<h3>月度汇总 · ' + y + '年</h3><div class="table-wrap"><table><thead><tr><th>月份</th><th>营业额</th><th>固定开支</th><th>菜品支出</th><th>纯利润</th><th>利润率</th></tr></thead><tbody>';
  let yearRevenue = 0, yearFixed = 0, yearMaterial = 0, yearProfit = 0;
  for (let month = 1; month <= 12; month++) {
    if (!currentData[y] || !currentData[y][month]) {
      html += '<tr><td>' + month + '月</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td></tr>';
      continue;
    }
    const days = daysInMonth(y, month);
    let revenue = 0, fixed = 0, material = 0, profit = 0;
    for (let d = 1; d <= days; d++) {
      const data = currentData[y][month][d];
      if (!data) continue;
      revenue += (data.revenue || 0);
      fixed += (data.fixed || 0);
      CATEGORIES.forEach(c => { if (c.key !== 'revenue' && c.key !== 'fixed') material += (data[c.key] || 0); });
      profit += computeProfit(data);
    }
    yearRevenue += revenue; yearFixed += fixed; yearMaterial += material; yearProfit += profit;
    const rate = revenue > 0 ? (profit / revenue * 100) : 0;
    const pClass = profit >= 0 ? 'profit-pos' : 'profit-neg';
    html += '<tr><td>' + month + '月</td><td>' + formatNum(revenue) + '</td><td>' + formatNum(fixed) + '</td><td>' + formatNum(material) + '</td><td class="' + pClass + '">' + formatNum(profit) + '</td><td class="' + pClass + '">' + rate.toFixed(1) + '%</td></tr>';
  }
  const yearRate = yearRevenue > 0 ? (yearProfit / yearRevenue * 100) : 0;
  const ypClass = yearProfit >= 0 ? 'profit-pos' : 'profit-neg';
  html += '<tr style="font-weight:700;background:#EDE8E2;"><td>全年合计</td><td>' + formatNum(yearRevenue) + '</td><td>' + formatNum(yearFixed) + '</td><td>' + formatNum(yearMaterial) + '</td><td class="' + ypClass + '">' + formatNum(yearProfit) + '</td><td class="' + ypClass + '">' + yearRate.toFixed(1) + '%</td></tr>';
  html += '</tbody></table></div>';
  el.innerHTML = html;
}

function saveData() {
  saveToStorage();
}

function exportJSON() {
  const blob = new Blob([JSON.stringify(currentData, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '谷子情数据_' + currentYear + '.json';
  a.click();
  URL.revokeObjectURL(url);
  setStatus('JSON 已导出');
}

function exportCSV() {
  const y = currentYear;
  const m = currentMonth;
  const days = daysInMonth(y, m);
  let csv = '\uFEFF日期,' + CATEGORIES.map(c => c.label).join(',') + ',盈利\n';
  for (let d = 1; d <= days; d++) {
    const data = getData(y, m, d);
    csv += y + '-' + m + '-' + d;
    CATEGORIES.forEach(c => csv += ',' + (data[c.key] || 0));
    csv += ',' + computeProfit(data) + '\n';
  }
  // Totals
  let totals = {}; CATEGORIES.forEach(c => totals[c.key] = 0);
  let totalProfit = 0;
  for (let d = 1; d <= days; d++) {
    const data = getData(y, m, d);
    CATEGORIES.forEach(c => totals[c.key] += (data[c.key] || 0));
    totalProfit += computeProfit(data);
  }
  csv += '合计';
  CATEGORIES.forEach(c => csv += ',' + totals[c.key]);
  csv += ',' + totalProfit + '\n';

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '谷子情_' + y + '年' + m + '月.csv';
  a.click();
  URL.revokeObjectURL(url);
  setStatus('CSV 已导出');
}

function showImportModal() {
  document.getElementById('importModal').classList.add('active');
}
function closeImportModal() {
  document.getElementById('importModal').classList.remove('active');
}
function doImport() {
  const raw = document.getElementById('importArea').value.trim();
  if (!raw) { closeImportModal(); return; }
  try {
    const data = JSON.parse(raw);
    currentData = data;
    saveToStorage();
    renderTable();
    closeImportModal();
    setStatus('导入成功');
  } catch(e) {
    alert('JSON 格式错误，请检查数据');
  }
}

function clearAll() {
  if (!confirm('确定要清空所有数据吗？此操作不可恢复！')) return;
  currentData = {};
  localStorage.removeItem(STORAGE_KEY);
  renderTable();
  setStatus('数据已清空');
}

// Year input change
document.getElementById('yearInput').addEventListener('change', () => { renderTable(); });

// Init
loadFromStorage();
initMonthSelect();
renderTable();
</script>
</body>
</html>
